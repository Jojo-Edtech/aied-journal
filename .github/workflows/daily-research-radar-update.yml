name: Daily AIED Research Radar Update

on:
  schedule:
    # 22:20 UTC = 06:20 Hong Kong time.
    - cron: '20 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/daily-research-radar-update.yml'
      - 'scripts/generate-research-radar.py'
      - 'scripts/validate-data.mjs'
      - 'data/radar/source_workbook_snapshot.json'
      - 'package.json'

permissions:
  contents: write

jobs:
  refresh-radar:
    name: Refresh research radar data
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong
      RADAR_CRAWL_JOURNAL_LIMIT: ${{ vars.RADAR_CRAWL_JOURNAL_LIMIT || '80' }}
      RADAR_MAX_PAGES_PER_JOURNAL: ${{ vars.RADAR_MAX_PAGES_PER_JOURNAL || '1' }}
      RADAR_MAX_ARTICLES_PER_JOURNAL: ${{ vars.RADAR_MAX_ARTICLES_PER_JOURNAL || '80' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install radar data dependencies
        run: python -m pip install --upgrade pandas openpyxl

      - name: Refresh radar data
        run: |
          python scripts/generate-research-radar.py \
            --max-pages-per-journal "$RADAR_MAX_PAGES_PER_JOURNAL" \
            --max-articles-per-journal "$RADAR_MAX_ARTICLES_PER_JOURNAL" \
            --crawl-journal-limit "$RADAR_CRAWL_JOURNAL_LIMIT" \
            --timeout 8

      - name: Validate data
        run: npm run validate:data

      - name: Commit radar data changes
        run: |
          set -euo pipefail
          if git diff --quiet -- data/radar; then
            echo "No radar data changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/radar
            git commit -m "Refresh AIED research radar data"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Build refreshed static site
        run: npm run build:static

      - name: Publish refreshed Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf /tmp/aied-journal-pages
          mkdir -p /tmp/aied-journal-pages
          cp -R dist/. /tmp/aied-journal-pages/
          cd /tmp/aied-journal-pages
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy refreshed AIED Journal Radar ${GITHUB_SHA::7}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin gh-pages
