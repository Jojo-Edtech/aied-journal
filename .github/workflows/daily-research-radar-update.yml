name: Daily AIED Research Radar Update

on:
  schedule:
    # 22:00 UTC = 06:00 Hong Kong / Beijing time.
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/daily-research-radar-update.yml'
      - 'scripts/generate-research-radar.py'
      - 'scripts/validate-data.mjs'
      - 'data/radar/source_workbook_snapshot.json'
      - 'package.json'

permissions:
  contents: write

jobs:
  refresh-radar:
    name: Refresh research radar data
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong
      RADAR_CRAWL_JOURNAL_LIMIT: ${{ vars.RADAR_CRAWL_JOURNAL_LIMIT || '80' }}
      RADAR_MAX_PAGES_PER_JOURNAL: ${{ vars.RADAR_MAX_PAGES_PER_JOURNAL || '1' }}
      RADAR_MAX_ARTICLES_PER_JOURNAL: ${{ vars.RADAR_MAX_ARTICLES_PER_JOURNAL || '80' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install radar data dependencies
        run: python -m pip install --upgrade pandas openpyxl

      - name: Refresh radar data
        run: |
          set -euo pipefail
          DAY_INDEX=$((10#$(date +%j) - 1))
          CRAWL_OFFSET=$((DAY_INDEX * RADAR_CRAWL_JOURNAL_LIMIT % 268))
          CROSSREF_FROM_DATE=$(date -d '5 years ago' +%Y-%m-%d)
          echo "Refreshing all article metadata; official-site batch starts at journal offset ${CRAWL_OFFSET}."
          python scripts/generate-research-radar.py \
            --max-pages-per-journal "$RADAR_MAX_PAGES_PER_JOURNAL" \
            --max-articles-per-journal "$RADAR_MAX_ARTICLES_PER_JOURNAL" \
            --crawl-journal-limit "$RADAR_CRAWL_JOURNAL_LIMIT" \
            --crawl-journal-offset "$CRAWL_OFFSET" \
            --crossref-from-pub-date "$CROSSREF_FROM_DATE" \
            --timeout 8

      - name: Validate data
        run: npm run validate:data

      - name: Summarize refresh
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const report = JSON.parse(fs.readFileSync('data/radar/crawl_report.json', 'utf8'));
          const coverage = report.preference_coverage || {};
          const policy = report.refresh_policy || {};
          const lines = [
            '## AIED Journal Radar daily refresh',
            '',
            `- Generated: ${report.generated_at || 'unknown'}`,
            `- Journals: ${report.journal_count || 0}`,
            `- Article samples: ${report.articles?.total || 0}`,
            `- Journals with latest-issue samples: ${coverage.journals_with_latest_issue || 0}/${coverage.total || 0}`,
            `- Official pages refreshed today: ${policy.official_page_batch_size || 0}`,
            `- RAG documents: ${report.rag_documents || 0}`,
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`);
          NODE

      - name: Commit radar data changes
        run: |
          set -euo pipefail
          if git diff --quiet -- data/radar; then
            echo "No radar data changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/radar
            git commit -m "Refresh AIED research radar data"
            git pull --rebase origin main
            git push origin main
          fi

      # deploy-pages.yml listens for this workflow to complete successfully,
      # then validates, builds and publishes the latest main branch once.
